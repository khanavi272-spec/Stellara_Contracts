name: Backend Blue-Green Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      active_slot:
        description: Currently live slot
        required: true
        default: blue
        type: choice
        options:
          - blue
          - green
      candidate_slot:
        description: Slot receiving the new release
        required: true
        default: green
        type: choice
        options:
          - blue
          - green
      run_db_rollback:
        description: Roll back the latest migration if deployment fails
        required: true
        default: false
        type: boolean

defaults:
  run:
    working-directory: ./Backend

env:
  NODE_VERSION: "20"

jobs:
  deploy:
    name: Blue-Green Deploy
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build

      - name: Run tests
        run: npm test -- --runInBand

      - name: Deploy candidate slot
        env:
          DEPLOY_HOOK_URL: ${{ secrets.BLUE_GREEN_DEPLOY_HOOK_URL }}
          DEPLOY_HOOK_TOKEN: ${{ secrets.BLUE_GREEN_DEPLOY_HOOK_TOKEN }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "BLUE_GREEN_DEPLOY_HOOK_URL secret is required"
            exit 1
          fi

          AUTH_HEADER=()
          if [ -n "$DEPLOY_HOOK_TOKEN" ]; then
            AUTH_HEADER=(-H "Authorization: Bearer $DEPLOY_HOOK_TOKEN")
          fi

          curl --fail --show-error --silent \
            -X POST "$DEPLOY_HOOK_URL" \
            -H "Content-Type: application/json" \
            "${AUTH_HEADER[@]}" \
            -d "{\"environment\":\"${{ github.event.inputs.environment }}\",\"slot\":\"${{ github.event.inputs.candidate_slot }}\",\"releaseVersion\":\"${{ github.sha }}\",\"commitSha\":\"${{ github.sha }}\",\"buildId\":\"${{ github.run_id }}\"}"

      - name: Blue-green promote
        env:
          NODE_ENV: production
          DEPLOYMENT_ENVIRONMENT: ${{ github.event.inputs.environment }}
          BLUE_GREEN_ACTIVE_SLOT: ${{ github.event.inputs.active_slot }}
          BLUE_GREEN_CANDIDATE_SLOT: ${{ github.event.inputs.candidate_slot }}
          BLUE_GREEN_PUBLIC_BASE_URL: ${{ secrets.BLUE_GREEN_PUBLIC_BASE_URL }}
          BLUE_GREEN_BLUE_BASE_URL: ${{ secrets.BLUE_GREEN_BLUE_BASE_URL }}
          BLUE_GREEN_GREEN_BASE_URL: ${{ secrets.BLUE_GREEN_GREEN_BASE_URL }}
          BLUE_GREEN_HEALTH_PATH: /health/ready
          BLUE_GREEN_SMOKE_PATHS: /health,/health/ready
          BLUE_GREEN_TRAFFIC_STEPS: 10,50,100
          BLUE_GREEN_LB_SWITCH_URL: ${{ secrets.BLUE_GREEN_LB_SWITCH_URL }}
          BLUE_GREEN_LB_STATUS_URL: ${{ secrets.BLUE_GREEN_LB_STATUS_URL }}
          BLUE_GREEN_LB_API_TOKEN: ${{ secrets.BLUE_GREEN_LB_API_TOKEN }}
          BLUE_GREEN_ROLLBACK_ON_FAILURE: "true"
          BLUE_GREEN_RUN_DB_ROLLBACK: ${{ github.event.inputs.run_db_rollback }}
          RELEASE_VERSION: ${{ github.sha }}
          RELEASE_COMMIT_SHA: ${{ github.sha }}
          RELEASE_BUILD_ID: ${{ github.run_id }}
          DATABASE_URL: ${{ github.event.inputs.environment == 'production' && secrets.PRODUCTION_DATABASE_URL || secrets.STAGING_DATABASE_URL }}
        run: npm run deploy:blue-green
